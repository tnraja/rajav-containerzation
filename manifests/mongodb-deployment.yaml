apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: shopnow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:5.0  # OFFICIAL IMAGE - ALWAYS WORKS
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: data
          mountPath: /data/db
      volumes:
      - name: data
        emptyDir: {}  # NO PVC PROBLEMS
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: shopnow
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
